<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academy Aziendale - Registrazione</title>
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body class="auth-page">
    <main class="auth-layout auth-layout-small">
      <section class="auth-intro">
        <span class="logo-mark"><p>🦁</p></span>
        <p class="eyebrow">BENVENUTO, NUOVO DIPENDENTE</p>
        <h1>Crea il tuo account</h1>
        <p>
          Benvenuto nell'area riservata dei dipendenti;<br />
          Accedi ai corsi, segui le scadenze e monitora la formazione del team.
        </p>
      </section>
      <section class="card auth-card">
        <h2>Registrazione</h2>
        <div id="message" class="message hidden" role="alert"></div>
        <form id="register-form">
          <div class="form-row">
            <div class="form-group">
              <label for="first-name">Nome</label>
              <input type="text" id="first-name" maxlength="80" required />
            </div>
            <div class="form-group">
              <label for="last-name">Cognome</label>
              <input type="text" id="last-name" maxlength="80" required />
            </div>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" autocomplete="email" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              minlength="8"
              autocomplete="new-password"
              required
            />
          </div>
          <div class="form-group">
            <label for="confirm-password">Conferma password</label>
            <input
              type="password"
              id="confirm-password"
              minlength="8"
              autocomplete="new-password"
              required
            />
          </div>
          <button class="button button-full" type="submit">Registrati</button>
        </form>
        <p class="auth-link"><a href="index.html">Torna al login</a></p>
      </section>
    </main>
    <script src="js/config.js"></script>
    <script src="js/register.js"></script>
  </body>
</html>
