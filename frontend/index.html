<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academy Aziendale - Login</title>
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body class="auth-page">
    <main class="auth-layout">
      <section class="auth-intro">
        <span class="logo-mark"><p>🦁</p></span>
        <p class="eyebrow">Formazione interna</p>
        <h1>Academy Aziendale</h1>
        <p>
          Consulta i corsi, segui le scadenze e monitora la formazione del team.
        </p>
      </section>

      <section class="card auth-card">
        <p class="eyebrow">Area riservata</p>
        <h2>Accedi</h2>
        <div id="message" class="message hidden" role="alert"></div>

        <form id="login-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" autocomplete="email" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              autocomplete="current-password"
              required
            />
          </div>
          <button class="button button-full" type="submit">Accedi</button>
        </form>
        <p class="auth-link">
          Non hai un account?<br />
          <a href="register.html">Registrati come dipendente</a>
        </p>
      </section>
    </main>
    <script src="js/config.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
